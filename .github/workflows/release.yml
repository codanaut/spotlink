name: Build and Publish Latest Release

on:
  workflow_dispatch: # Allows manual trigger from the Actions tab

jobs:
  build-windows:
    name: Build Windows
    runs-on: windows-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: 'spotlink-desktop/package-lock.json'

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Rust Cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: . -> target

      - name: Install dependencies
        working-directory: ./spotlink-desktop
        run: npm install

      - name: Build Bundles via Tauri Action
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: ./spotlink-desktop

      - name: Stage Windows Artifacts
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path ./staging
          
          # Dynamic search to locate the raw standalone executable binary 
          $portableExe = Get-ChildItem -Path . -Filter *.exe -Recurse | Where-Object { 
            $_.FullName -like "*target*release*" -and 
            $_.FullName -notlike "*bundle*" -and 
            $_.FullName -notlike "*deps*" -and 
            $_.FullName -notlike "*incremental*" -and 
            $_.FullName -notlike "*build*" 
          } | Select-Object -First 1

          if ($portableExe) {
              Copy-Item -Path $portableExe.FullName -Destination ./staging/SpotLink-portable.exe
              Write-Host "Successfully staged portable binary from: $($portableExe.FullName)"
          } else {
              Write-Error "Error: Could not locate the standalone portable executable binary."
              exit 1
          }

          # Target and extract compiled installers (.exe and .msi) from the generated bundle directories
          Get-ChildItem -Path . -Filter *.exe -Recurse | Where-Object { $_.FullName -like "*target*release*bundle*" } | Copy-Item -Destination ./staging/
          Get-ChildItem -Path . -Filter *.msi -Recurse | Where-Object { $_.FullName -like "*target*release*bundle*" } | Copy-Item -Destination ./staging/

      - name: Upload Windows Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-assets
          path: ./staging/*

  build-linux:
    name: Build Linux
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: 'spotlink-desktop/package-lock.json'

      - name: Install system dependencies (Tauri Core)
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            build-essential \
            curl \
            wget \
            file \
            libxdo-dev \
            libssl-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev

      - name: Install RPM bundling dependency
        run: |
          sudo apt-get install -y rpm

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Rust Cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: . -> target

      - name: Install dependencies
        working-directory: ./spotlink-desktop
        run: npm install

      - name: Build Bundles via Tauri Action
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: ./spotlink-desktop

      - name: Stage Linux Artifacts
        run: |
          mkdir staging
          # Recursively gathers .deb, .rpm, and .AppImage assets matching your target requirements
          find target/release/ -type f \( -name "*.deb" -o -name "*.rpm" -o -name "*.AppImage" \) -exec cp {} staging/ \;

      - name: Upload Linux Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-assets
          path: ./staging/*

  build-ios:
    name: Build iOS
    runs-on: macos-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: 'spotlink-desktop/package-lock.json'

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-ios

      - name: Rust Cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: . -> target

      - name: Install dependencies
        working-directory: ./spotlink-desktop
        run: npm install

      - name: Initialize Tauri iOS project
        working-directory: ./spotlink-desktop
        run: npx tauri ios init

      - name: Generate iOS App Icons from Desktop Icon
        working-directory: ./spotlink-desktop
        run: |
          TARGET_DIR="src-tauri/gen/apple/Assets.xcassets/AppIcon.appiconset"
          mkdir -p "$TARGET_DIR"
          SOURCE_ICON="src-tauri/icons/icon.png"
          
          sips -z 20 20   "$SOURCE_ICON" --out "$TARGET_DIR/AppIcon-20x20@1x.png"
          sips -z 40 40   "$SOURCE_ICON" --out "$TARGET_DIR/AppIcon-20x20@2x.png"
          sips -z 60 60   "$SOURCE_ICON" --out "$TARGET_DIR/AppIcon-20x20@3x.png"
          sips -z 40 40   "$SOURCE_ICON" --out "$TARGET_DIR/AppIcon-20x20@2x-1.png"
          sips -z 29 29   "$SOURCE_ICON" --out "$TARGET_DIR/AppIcon-29x29@1x.png"
          sips -z 58 58   "$SOURCE_ICON" --out "$TARGET_DIR/AppIcon-29x29@2x.png"
          sips -z 87 87   "$SOURCE_ICON" --out "$TARGET_DIR/AppIcon-29x29@3x.png"
          sips -z 58 58   "$SOURCE_ICON" --out "$TARGET_DIR/AppIcon-29x29@2x-1.png"
          sips -z 40 40   "$SOURCE_ICON" --out "$TARGET_DIR/AppIcon-40x40@1x.png"
          sips -z 80 80   "$SOURCE_ICON" --out "$TARGET_DIR/AppIcon-40x40@2x.png"
          sips -z 120 120 "$SOURCE_ICON" --out "$TARGET_DIR/AppIcon-40x40@3x.png"
          sips -z 80 80   "$SOURCE_ICON" --out "$TARGET_DIR/AppIcon-40x40@2x-1.png"
          sips -z 120 120 "$SOURCE_ICON" --out "$TARGET_DIR/AppIcon-60x60@2x.png"
          sips -z 180 180 "$SOURCE_ICON" --out "$TARGET_DIR/AppIcon-60x60@3x.png"
          sips -z 76 76   "$SOURCE_ICON" --out "$TARGET_DIR/AppIcon-76x76@1x.png"
          sips -z 152 152 "$SOURCE_ICON" --out "$TARGET_DIR/AppIcon-76x76@2x.png"
          sips -z 167 167 "$SOURCE_ICON" --out "$TARGET_DIR/AppIcon-83.5x83.5@2x.png"
          sips -z 1024 1024 "$SOURCE_ICON" --out "$TARGET_DIR/AppIcon-512@2x.png"

      - name: Disable Code Signing in Xcode Project Configuration
        working-directory: ./spotlink-desktop
        run: |
          node -e '
            const fs = require("fs");
            const path = "src-tauri/gen/apple/spotlink-desktop.xcodeproj/project.pbxproj";
            if (fs.existsSync(path)) {
              let content = fs.readFileSync(path, "utf8");
              content = content.replace(/buildSettings = \{/g, "buildSettings = {\n\t\t\t\tCODE_SIGNING_ALLOWED = NO;\n\t\t\t\tCODE_SIGNING_REQUIRED = NO;");
              fs.writeFileSync(path, content, "utf8");
              console.log("Successfully patched project.pbxproj to turn off code-signing.");
            } else {
              console.error("Error: project.pbxproj not found at " + path);
              process.exit(1);
            }
          '

      - name: Build Unsigned Application Bundle via Tauri
        working-directory: ./spotlink-desktop
        run: npx tauri ios build --no-sign

      - name: Package into IPA for SideStore
        run: |
          mkdir -p Payload
          APP_PATH=$(find . ~/Library/Developer/Xcode/DerivedData -iname "spotlink.app" -type d 2>/dev/null | head -n 1)
          if [ -z "$APP_PATH" ]; then
            echo "Error: SpotLink.app bundle could not be found anywhere!"
            exit 1
          fi
          cp -r "$APP_PATH" Payload/
          zip -r SpotLink.ipa Payload

      - name: Upload iOS Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-assets
          path: SpotLink.ipa

  publish-release:
    name: Publish Release
    runs-on: ubuntu-latest
    needs: [build-windows, build-linux, build-ios]
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download all compiled artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./artifacts

      - name: Create or update rolling release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Safe conditional check to prevent errors if the target release exists
          if gh release view latest >/dev/null 2>&1; then
            echo "Rolling target release 'latest' already exists. Updating release text..."
            gh release edit latest --notes "Automated cross-platform rolling builds for Windows, Linux, and iOS. Refreshed on $(date)."
          else
            echo "Rolling target release 'latest' not found. Executing creation..."
            gh release create latest \
              --title "SpotLink Latest Build" \
              --notes "Automated cross-platform rolling builds for Windows, Linux, and iOS. Refreshed on $(date)." \
              --prerelease
          fi
          
          echo "Processing artifact uploads..."
          # Pipe find selections directly into a shell loop so errors bubble up explicitly
          find ./artifacts -type f \( -name "*.exe" -o -name "*.msi" -o -name "*.deb" -o -name "*.rpm" -o -name "*.AppImage" -o -name "*.ipa" \) | while read -r asset; do
            echo "Uploading asset: $asset"
            gh release upload latest "$asset" --clobber
          done