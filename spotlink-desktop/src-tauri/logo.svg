<svg id="master-svg" class="w-full h-full" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
              <defs>
                <!-- Background Gradient Def -->
                <linearGradient id="svg-bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
                  <stop offset="0%" stop-color="#020617" id="stop-bg-1"/>
                  <stop offset="100%" stop-color="#020617" id="stop-bg-2"/>
                </linearGradient>

                <!-- Icon Color Gradient Def -->
                <linearGradient id="svg-icon-grad" x1="0%" y1="0%" x2="100%" y2="100%">
                  <stop offset="0%" stop-color="#38bdf8" id="stop-icon-1"/>
                  <stop offset="100%" stop-color="#0284c7" id="stop-icon-2"/>
                </linearGradient>

                <!-- Soft Dynamic Neon Glow -->
                <filter id="svg-glow" x="-30%" y="-30%" width="160%" height="160%">
                  <feGaussianBlur stdDeviation="0.6" result="blur" id="svg-blur-node"/>
                  <feMerge>
                    <feMergeNode in="blur"/>
                    <feMergeNode in="SourceGraphic"/>
                  </feMerge>
                </filter>

                <!-- Shadow Depth -->
                <filter id="svg-shadow" x="-20%" y="-20%" width="140%" height="140%">
                  <feDropShadow dx="0" dy="12" stdDeviation="5.6" flood-color="#000000" flood-opacity="0.32" id="svg-shadow-node"/>
                </filter>

                <!-- Apple macOS & iOS Squircle Standard Vector Mapping (Adaptive Size) -->
                <clipPath id="squircle-clip">
                  <path d="M 0,256 C 0,57.6 57.6,0 256,0 C 454.4,0 512,57.6 512,256 C 512,454.4 454.4,512 256,512 C 57.6,512 0,454.4 0,256 Z"/>
                </clipPath>
              </defs>

              <!-- App Icon Masked Container (Renders dynamic corner styles) -->
              <g id="app-icon-body">
                <!-- Main Background Rect -->
                <rect width="512" height="512" id="svg-bg-rect" fill="url(#svg-bg-grad)" rx="80" opacity="1"/>
                
                <!-- Stylized Inside Rim Shadow Border -->
                <rect x="8" y="8" width="496" height="496" id="svg-border-rect" fill="none" stroke="#38bdf8" stroke-opacity="0.45" stroke-width="2.5" rx="72" opacity="1"/>

                <!-- Embedded Grid Matrix Aesthetic overlay -->
                <g opacity="0.03" stroke="#ffffff" stroke-width="1">
                  <line x1="64" y1="0" x2="64" y2="512"/>
                  <line x1="128" y1="0" x2="128" y2="512"/>
                  <line x1="192" y1="0" x2="192" y2="512"/>
                  <line x1="256" y1="0" x2="256" y2="512"/>
                  <line x1="320" y1="0" x2="320" y2="512"/>
                  <line x1="384" y1="0" x2="384" y2="512"/>
                  <line x1="448" y1="0" x2="448" y2="512"/>
                  
                  <line x1="0" y1="64" x2="512" y2="64"/>
                  <line x1="0" y1="128" x2="512" y2="128"/>
                  <line x1="0" y1="192" x2="512" y2="192"/>
                  <line x1="0" y1="256" x2="512" y2="256"/>
                  <line x1="0" y1="320" x2="512" y2="320"/>
                  <line x1="0" y1="384" x2="512" y2="384"/>
                  <line x1="0" y1="448" x2="512" y2="448"/>
                </g>

                <!-- Centered Combined Icons Layout -->
                <g id="svg-icons-group" filter="url(#svg-glow)">
                  
                  <!-- Left Icon Slot -->
                  <g id="svg-tower-left" stroke="url(#svg-icon-grad)" fill="none" stroke-linecap="round" stroke-linejoin="round" stroke-width="1" transform="translate(98.80000000000001, 177.8) scale(5.1)"/>

                  <!-- Center Icon Slot -->
                  <g id="svg-move-arrows" stroke="url(#svg-icon-grad)" fill="none" stroke-linecap="round" stroke-linejoin="round" stroke-width="1" transform="translate(74.80000000000001, 57.80000000000001) scale(15.1)"><path d="M12 2c-1.7 0-3 1.3-3 3c0 .8.3 1.5.8 2.1l-4.1 11.2c-.3.8.2 1.7 1.1 1.7h10.4c.9 0 1.4-.9 1.1-1.7L14.2 7.1c.5-.6.8-1.3.8-2.1 0-1.7-1.3-3-3-3Z"/><path d="M10 12h4"/><path d="M8.5 16h7"/><path d="M12 5v15"/><path d="M19 5c3 3 3 7 0 10"/><path d="M5 5C2 8 2 12 5 15"/></g>

                  <!-- Right Icon Slot -->
                  <g id="svg-tower-right" stroke="url(#svg-icon-grad)" fill="none" stroke-linecap="round" stroke-linejoin="round" transform="translate(290.8, 177.8) scale(5.1)" stroke-width="1"/>

                </g>

                <!-- Premium Typography Label -->
                <text id="svg-brand-text" text-anchor="middle" font-weight="800" opacity="1" font-size="45" letter-spacing="6" font-family="system-ui, sans-serif" x="256" y="440" fill="#4facfe">SPOTLINK</text>

              </g>
            </svg>